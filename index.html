<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Blaziken TCG Checklist - ENG</title>
    <meta name="description" content="A complete English Blaziken Pokemon TCG checklist with print and finish variants.">
    <meta name="theme-color" content="#160c04">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Blaziken TCG">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
      * { box-sizing: border-box; }
      html { background: #0a0704; }
      body {
        position: relative;
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 166, 74, 0.2), transparent 30rem),
          radial-gradient(circle at 86% 18%, rgba(232, 93, 47, 0.18), transparent 28rem),
          linear-gradient(160deg, #080403 0%, #190a02 54%, #080712 100%);
        color: #f0e0cc;
        font-family: Georgia, "Times New Roman", serif;
      }
      body::before {
        content: "";
        position: fixed;
        z-index: 0;
        inset: 0;
        background:
          radial-gradient(circle at 82% 22%, rgba(255, 132, 33, 0.34), transparent 26rem),
          radial-gradient(circle at 14% 74%, rgba(190, 46, 0, 0.25), transparent 25rem),
          radial-gradient(circle at 58% 108%, rgba(255, 194, 80, 0.13), transparent 32rem);
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        z-index: 0;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(8, 4, 3, 0.54) 0%, rgba(8, 4, 3, 0.32) 42%, rgba(8, 4, 3, 0.08) 74%, rgba(8, 4, 3, 0.22) 100%),
          radial-gradient(circle at 76% 30%, rgba(255, 124, 39, 0.22), transparent 25rem),
          radial-gradient(circle at 20% 86%, rgba(120, 20, 0, 0.28), transparent 26rem);
        pointer-events: none;
      }
      button, input { font: inherit; }
      button { touch-action: manipulation; }
      .app {
        position: relative;
        z-index: 3;
        min-height: 100vh;
        padding-bottom: calc(48px + env(safe-area-inset-bottom));
      }
      .background-art {
        position: fixed;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        pointer-events: none;
      }
      .art {
        position: absolute;
        display: block;
        width: min(36vw, 470px);
        filter: drop-shadow(0 0 34px rgba(255, 119, 28, 0.74)) drop-shadow(0 24px 48px rgba(0, 0, 0, 0.9));
        opacity: 0.78;
        user-select: none;
      }
      .art-sprite {
        image-rendering: pixelated;
        filter: drop-shadow(0 0 22px rgba(255, 119, 28, 0.82)) drop-shadow(0 18px 36px rgba(0, 0, 0, 0.92));
      }
      .art-vector {
        filter: drop-shadow(0 0 28px rgba(255, 190, 82, 0.72)) drop-shadow(0 20px 40px rgba(0, 0, 0, 0.88));
      }
      .art-main {
        top: 90px;
        right: max(-280px, calc((100vw - 1180px) / 2 - 420px));
        width: clamp(250px, 24vw, 360px);
        opacity: 0.88;
        transform: rotate(5deg);
      }
      .art-shiny {
        left: max(-270px, calc((100vw - 1180px) / 2 - 390px));
        bottom: -78px;
        width: clamp(190px, 18vw, 270px);
        opacity: 0.62;
        transform: rotate(-7deg) scaleX(-1);
      }
      .art-home {
        right: max(-230px, calc((100vw - 1180px) / 2 - 340px));
        bottom: -76px;
        width: clamp(210px, 19vw, 280px);
        opacity: 0.45;
        transform: rotate(-6deg);
      }
      .art-dream {
        top: 38vh;
        left: max(-230px, calc((100vw - 1180px) / 2 - 350px));
        width: clamp(210px, 19vw, 280px);
        opacity: 0.44;
        transform: rotate(9deg);
      }
      .art-float-a {
        top: 82px;
        left: max(-180px, calc((100vw - 1180px) / 2 - 290px));
        width: clamp(150px, 13vw, 200px);
        opacity: 0.55;
        transform: rotate(-13deg) scaleX(-1);
      }
      .art-float-b {
        top: 40vh;
        right: max(-240px, calc((100vw - 1180px) / 2 - 360px));
        width: clamp(155px, 14vw, 220px);
        opacity: 0.52;
        transform: rotate(9deg);
      }
      .art-float-c {
        display: none;
      }
      .art-float-d {
        display: none;
      }
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
        border-bottom: 1px solid rgba(232, 93, 47, 0.55);
        background: linear-gradient(180deg, rgba(36, 10, 0, 0.96), rgba(24, 8, 0, 0.9));
        backdrop-filter: blur(14px);
        box-shadow: 0 3px 24px rgba(0, 0, 0, 0.72), 0 0 28px rgba(232, 93, 47, 0.16);
      }
      .header-inner {
        max-width: 960px;
        margin: 0 auto;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 9px;
      }
      .logo {
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        border-radius: 9px;
        background: radial-gradient(circle at 35% 20%, #ffd18a, #e85d2f 45%, #5a1300 100%);
        color: #190800;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        box-shadow: 0 0 16px rgba(232, 93, 47, 0.5);
      }
      h1 {
        margin: 0;
        color: #fff;
        font-size: 15px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(232, 93, 47, 0.5);
        white-space: nowrap;
      }
      .progress {
        flex: 1;
        height: 5px;
        margin: 0 4px;
        overflow: hidden;
        border-radius: 999px;
        background: #1a0800;
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c03000, #ffa040);
        box-shadow: 0 0 6px rgba(232, 93, 47, 0.6);
        transition: width 0.25s ease;
      }
      .count {
        color: #ff8f5d;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .search {
        width: 96px;
        min-height: 30px;
        padding: 5px 10px;
        border: 1px solid rgba(232, 93, 47, 0.25);
        border-radius: 8px;
        outline: none;
        background: rgba(0, 0, 0, 0.5);
        color: #f0e0cc;
        font-size: 12px;
        box-shadow: inset 0 0 12px rgba(232, 93, 47, 0.08);
      }
      .search::placeholder { color: #7a4a32; }
      .search:focus {
        border-color: rgba(255, 160, 64, 0.72);
        box-shadow: 0 0 0 3px rgba(232, 93, 47, 0.16), inset 0 0 12px rgba(232, 93, 47, 0.12);
      }
      .pill-group {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .pill {
        min-height: 28px;
        padding: 4px 9px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.38);
        color: #906050;
        cursor: pointer;
        font-size: 10px;
        box-shadow: inset 0 0 10px rgba(255, 160, 64, 0.04);
      }
      .pill.active {
        border-color: var(--active-color, #e85d2f);
        background: color-mix(in srgb, var(--active-color, #e85d2f) 18%, transparent);
        color: var(--active-color, #e85d2f);
        box-shadow: 0 0 16px color-mix(in srgb, var(--active-color, #e85d2f) 22%, transparent);
      }
      .divider {
        color: rgba(255, 255, 255, 0.18);
      }
      .content {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px 14px 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
        gap: 12px;
      }
      .card {
        position: relative;
        aspect-ratio: 63 / 88;
        overflow: hidden;
        border: 2px solid color-mix(in srgb, var(--era-color) 35%, transparent);
        border-radius: 12px;
        background: linear-gradient(145deg, #251108, #070302);
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.88),
          0 0 0 5px color-mix(in srgb, var(--era-color) 24%, transparent),
          0 12px 26px rgba(0, 0, 0, 0.88),
          0 4px 22px color-mix(in srgb, var(--era-color) 24%, transparent);
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(135deg, rgba(255, 216, 154, 0.14), transparent 28%, transparent 66%, rgba(232, 93, 47, 0.14));
        pointer-events: none;
      }
      .card:active { transform: scale(0.985); }
      @media (hover: hover) {
        .card:not(.owned):hover { transform: translateY(-3px) scale(1.035); }
      }
      .card.owned {
        border-color: rgba(255, 255, 255, 0.18);
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.9),
          0 0 0 5px rgba(255, 255, 255, 0.08),
          0 10px 22px rgba(0, 0, 0, 0.86);
      }
      .card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .card.owned img {
        filter: grayscale(100%) brightness(0.38);
      }
      .owned-badge {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.22);
      }
      .owned-badge span {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border: 2.5px solid rgba(255, 255, 255, 0.55);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 22px;
        font-weight: 800;
      }
      .card-label {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 2;
        padding: 32px 7px 7px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.92));
        text-align: center;
      }
      .card.owned .card-label { opacity: 0.45; }
      .card-name {
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        line-height: 1.2;
      }
      .card-num {
        margin-top: 1px;
        color: #a08060;
        font-size: 8px;
      }
      .card-finish {
        margin-top: 2px;
        color: #d6a16d;
        font-size: 8px;
        font-weight: 700;
      }
      .card-set {
        margin-top: 1px;
        color: #a08060;
        font-size: 8px;
        line-height: 1.15;
      }
      .era-dot {
        position: absolute;
        top: 6px;
        right: 6px;
        z-index: 3;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--era-color);
        box-shadow: 0 0 5px var(--era-color);
      }
      .card.owned .era-dot {
        opacity: 0.3;
        box-shadow: none;
      }
      .empty {
        padding: 80px 0;
        color: #7a5040;
        text-align: center;
      }
      .install-note {
        max-width: 960px;
        margin: 12px auto 0;
        padding: 0 14px;
        color: #8f6b58;
        font: 12px/1.4 Arial, sans-serif;
      }
      @media (min-width: 860px) {
        .header-inner,
        .content,
        .install-note {
          max-width: 1180px;
        }
        .content {
          padding: 26px 24px 0;
        }
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
          gap: 18px;
        }
        .card {
          border-width: 3px;
          border-radius: 16px;
          box-shadow:
            0 0 0 4px rgba(0, 0, 0, 0.92),
            0 0 0 7px color-mix(in srgb, var(--era-color) 25%, transparent),
            0 18px 38px rgba(0, 0, 0, 0.92),
            0 8px 34px color-mix(in srgb, var(--era-color) 28%, transparent);
        }
        .card.owned {
          box-shadow:
            0 0 0 4px rgba(0, 0, 0, 0.92),
            0 0 0 7px rgba(255, 255, 255, 0.08),
            0 16px 34px rgba(0, 0, 0, 0.9);
        }
        .card-label {
          padding: 44px 10px 10px;
        }
        .card-name {
          font-size: 12px;
        }
        .card-finish,
        .card-set {
          font-size: 9px;
        }
        .owned-badge span {
          width: 58px;
          height: 58px;
          font-size: 25px;
        }
        .era-dot {
          top: 9px;
          right: 9px;
          width: 10px;
          height: 10px;
        }
      }
      @media (max-width: 520px) {
        body::after {
          background:
            linear-gradient(180deg, rgba(8, 4, 3, 0.42) 0%, rgba(8, 4, 3, 0.34) 42%, rgba(8, 4, 3, 0.56) 100%),
            radial-gradient(circle at 74% 22%, rgba(255, 124, 39, 0.2), transparent 18rem);
        }
        .art-main {
          top: 128px;
          right: -230px;
          width: 320px;
          opacity: 0.42;
        }
        .art-shiny {
          top: auto;
          left: -180px;
          bottom: 58px;
          width: 235px;
          opacity: 0.24;
        }
        .art-home {
          right: -152px;
          bottom: -62px;
          width: 210px;
          opacity: 0.2;
        }
        .art-dream {
          top: 45vh;
          left: -146px;
          width: 190px;
          opacity: 0.17;
        }
        .art-float-a {
          display: none;
        }
        .art-float-b,
        .art-float-c,
        .art-float-d {
          display: none;
        }
        .header { padding-right: 10px; padding-left: 10px; }
        .title-row { gap: 7px; }
        h1 { font-size: 13px; }
        .logo { width: 24px; height: 24px; }
        .search { flex: 1 1 110px; width: auto; }
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      }
    </style>
  </head>

        { id: 26, name: "Blaziken VMAX (Alt Art)", set: "Chilling Reign",                 num: "200/198",   rarity: "Alt Art Secret",   era: "SwSh Era",     img: "https://images.pokemontcg.io/swsh6/200_hires.png"   },
        { id: 27, name: "Blaziken VMAX (Rainbow)", set: "Chilling Reign",                 num: "201/198",   rarity: "Rainbow Rare",     era: "SwSh Era",     img: "https://images.pokemontcg.io/swsh6/201_hires.png"   },
        { id: 28, name: "Blaziken V",              set: "Silver Tempest",                 num: "TG14/TG30", rarity: "Trainer Gallery",  era: "SwSh Era",     img: "https://images.pokemontcg.io/swsh12tg/TG14_hires.png"},
        { id: 29, name: "Blaziken VMAX",           set: "Silver Tempest",                 num: "TG15/TG30", rarity: "Trainer Gallery",  era: "SwSh Era",     img: "https://images.pokemontcg.io/swsh12tg/TG15_hires.png"},
        { id: 30, name: "Blaziken ex",             set: "Journey Together",               num: "24/159",    rarity: "Double Rare",      era: "SV Era",       img: "https://images.pokemontcg.io/sv9/24_hires.png"      },
        { id: 31, name: "Blaziken",                set: "Destined Rivals",                num: "42/182",    rarity: "Rare",             era: "SV Era",       img: "https://images.pokemontcg.io/sv10/42_hires.png"     },
        { id: 32, name: "Blaziken (IR)",           set: "Destined Rivals",                num: "192/182",   rarity: "Illus. Rare",      era: "SV Era",       img: "https://images.pokemontcg.io/sv10/192_hires.png"    },
      ];

      function setPrints(finish, bundle) {
        return [
          { id: "set", finish, bundle },
          { id: "reverse", finish: "Reverse Holo", bundle: `${bundle} reverse holo` },
        ];
      }

      function singlePrint(finish, bundle, id = "set") {
        return [{ id, finish, bundle }];
      }

      const PRINT_VARIANTS = {
        1: [
          { id: "rs-holo", finish: "Holo", bundle: "EX Ruby & Sapphire booster/set" },
          { id: "rs-reverse", finish: "Reverse Holo", bundle: "EX Ruby & Sapphire reverse holo" },
          { id: "battle-holo", finish: "Holo", bundle: "EX Battle Stadium Deck Kit" },
          { id: "battle-nonholo", finish: "Non-Holo", bundle: "EX Battle Stadium Deck Kit" },
          { id: "master-holo", finish: "Holo", bundle: "Blaziken EX Master Trainer Deck" },
          { id: "master-nonholo", finish: "Non-Holo", bundle: "Blaziken EX Master Trainer Deck" },
          { id: "worlds-2004", finish: "World Championship", bundle: "2004 World Championship Deck: Blaziken Tech" },
        ],
        2: setPrints("Non-Holo", "EX Ruby & Sapphire booster/set"),
        3: singlePrint("ex Holo", "EX Team Magma vs Team Aqua booster/set"),
        4: singlePrint("Non-Holo", "POP Series 1 pack"),
        5: [
          { id: "set", finish: "Holo", bundle: "EX Emerald booster/set" },
          { id: "reverse", finish: "Reverse Holo", bundle: "EX Emerald reverse holo" },
          { id: "wildfire", finish: "Non-Holo", bundle: "Wildfire Theme Deck" },
          { id: "typhlosion-epic", finish: "Non-Holo", bundle: "Typhlosion ex Epic Collection Deck" },
        ],
        6: setPrints("Non-Holo", "EX Holon Phantoms booster/set"),
        7: singlePrint("ex Holo", "EX Crystal Guardians booster/set"),
        8: setPrints("Holo", "EX Power Keepers booster/set"),
        9: setPrints("Holo", "Great Encounters booster/set"),
        10: setPrints("Holo", "Platinum booster/set"),
        11: setPrints("Holo", "Supreme Victors booster/set"),
        12: singlePrint("LV.X Holo", "Supreme Victors booster/set"),
        13: [
          { id: "set", finish: "Holo", bundle: "Dark Explorers booster/set" },
          { id: "reverse", finish: "Reverse Holo", bundle: "Dark Explorers reverse holo" },
          { id: "plasma-blast-blister", finish: "Cosmos Holo", bundle: "Plasma Blast Single Pack Blisters" },
        ],
        14: setPrints("Holo", "Furious Fists booster/set"),
        15: setPrints("Holo", "Primal Clash booster/set"),
        16: singlePrint("Promo Holo", "XY Black Star Promos"),
        17: singlePrint("Promo Holo", "XY Black Star Promos"),
        18: singlePrint("GX Holo", "Celestial Storm booster/set"),
        19: singlePrint("Full Art Holo", "Celestial Storm booster/set"),
        20: singlePrint("Rainbow Holo", "Celestial Storm booster/set"),
        21: [
          { id: "set", finish: "Holo", bundle: "Dragon Majesty booster/set" },
          { id: "reverse", finish: "Reverse Holo", bundle: "Dragon Majesty reverse holo" },
          { id: "blazing-volcano", finish: "Non-Holo", bundle: "Blazing Volcano Theme Deck" },
        ],
        22: setPrints("Holo", "Darkness Ablaze booster/set"),
        23: singlePrint("V Holo", "Chilling Reign booster/set"),
        24: singlePrint("VMAX Holo", "Chilling Reign booster/set"),
        25: singlePrint("Full Art Holo", "Chilling Reign booster/set"),
        26: singlePrint("Alt Art Holo", "Chilling Reign booster/set"),
        27: singlePrint("Rainbow Holo", "Chilling Reign booster/set"),
        28: singlePrint("Trainer Gallery Holo", "Silver Tempest Trainer Gallery"),
        29: singlePrint("Trainer Gallery Holo", "Silver Tempest Trainer Gallery"),
        30: singlePrint("Double Rare Holo", "Journey Together booster/set"),
        31: setPrints("Holo", "Destined Rivals booster/set"),
        32: singlePrint("Illustration Holo", "Destined Rivals booster/set"),
      };

      const CHECKLIST_CARDS = ALL_CARDS.flatMap((card) => {
        const variants = PRINT_VARIANTS[card.id] || singlePrint(getFoilStatus(card), card.set);
        return variants.map((print) => ({
          ...card,
          cardId: card.id,
          id: `${card.id}-${print.id}`,
          finish: print.finish,
          bundle: print.bundle,
        }));
      });

      const DEFAULT_OWNED_IDS = ["2-set", "22-set", "23-set", "24-set", "26-set", "28-set", "29-set", "30-set"];
      const ERAS = ["All", "EX Era", "DP Era", "Platinum Era", "BW Era", "XY Era", "SM Era", "SwSh Era", "SV Era"];
      const ERA_COLORS = {
        "EX Era": "#e85d2f",
        "DP Era": "#b07a4a",
        "Platinum Era": "#7b6ef6",
        "BW Era": "#aaa",
        "XY Era": "#2a8fd4",
        "SM Era": "#f0a500",
        "SwSh Era": "#29b87a",
        "SV Era": "#e94775",
      };

      const state = {
        owned: loadOwned(),
        era: "All",
        ownedFilter: "all",
        search: "",
      };

      const els = {
        count: document.getElementById("count"),
        progressFill: document.getElementById("progressFill"),
        search: document.getElementById("search"),
        ownedFilters: document.getElementById("ownedFilters"),
        eraFilters: document.getElementById("eraFilters"),
        grid: document.getElementById("grid"),
        empty: document.getElementById("empty"),
        installNote: document.getElementById("installNote"),
      };

      function loadOwned() {
        try {
          const saved = JSON.parse(localStorage.getItem("blaziken-owned-ids"));
          if (Array.isArray(saved)) return new Set(saved.map((id) => typeof id === "number" ? `${id}-set` : id));
        } catch (_) {}
        return new Set(DEFAULT_OWNED_IDS);
      }

      function saveOwned() {
        localStorage.setItem("blaziken-owned-ids", JSON.stringify(Array.from(state.owned)));
      }

      function matchesCard(card) {
        const search = state.search.trim().toLowerCase();
        if (state.era !== "All" && card.era !== state.era) return false;
        if (state.ownedFilter === "owned" && !state.owned.has(card.id)) return false;
        if (state.ownedFilter === "missing" && state.owned.has(card.id)) return false;
        if (!search) return true;
        return card.name.toLowerCase().includes(search) ||
          card.set.toLowerCase().includes(search) ||
          (card.bundle || "").toLowerCase().includes(search) ||
          card.num.toLowerCase().includes(search) ||
          card.rarity.toLowerCase().includes(search) ||
          getFoilStatus(card).toLowerCase().includes(search);
      }

      function getFoilStatus(card) {
        if (card.finish) return card.finish;
        if (card.rarity.includes("Rainbow")) return "Rainbow Holo";
        if (card.rarity.includes("Alt Art")) return "Alt Art Holo";
        if (card.rarity.includes("Full Art") || card.rarity.includes("Trainer")) return "Full Art Holo";
        if (card.rarity.includes("Illus")) return "Illustration Holo";
        if (card.rarity === "Promo") return "Promo Holo";
        if (card.rarity.includes("Holo") || card.rarity.includes("Ultra") || card.rarity.includes("Double")) return "Holo";
        if (card.era === "SV Era" && card.rarity === "Rare") return "Holo";
        return "Non-Holo";
      }

      function makePill(label, active, color, onClick) {
        const button = document.createElement("button");
        button.className = active ? "pill active" : "pill";
        button.textContent = label;
        if (color) button.style.setProperty("--active-color", color);
        button.type = "button";
        button.addEventListener("click", onClick);
        return button;
      }

      function renderFilters() {
        els.ownedFilters.replaceChildren(
          makePill("All", state.ownedFilter === "all", "#e85d2f", () => { state.ownedFilter = "all"; render(); }),
          makePill("Owned", state.ownedFilter === "owned", "#e85d2f", () => { state.ownedFilter = "owned"; render(); }),
          makePill("Need", state.ownedFilter === "missing", "#e85d2f", () => { state.ownedFilter = "missing"; render(); })
        );

        const eraButtons = ERAS.map((era) => {
          const color = ERA_COLORS[era] || "#e85d2f";
          return makePill(era, state.era === era, color, () => { state.era = era; render(); });
        });
        els.eraFilters.replaceChildren(...eraButtons);
      }

      function renderCards(cards) {
        const nodes = cards.map((card) => {
          const isOwned = state.owned.has(card.id);
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = isOwned ? "card owned" : "card";
          tile.style.setProperty("--era-color", ERA_COLORS[card.era] || "#e85d2f");
          tile.setAttribute("aria-label", `${isOwned ? "Mark missing" : "Mark owned"}: ${card.name} ${card.num}, ${card.bundle || card.set}, ${getFoilStatus(card)}`);

          const img = document.createElement("img");
          img.src = card.img;
          img.alt = `${card.name} ${card.set} ${card.num}`;
          img.loading = "lazy";
          img.decoding = "async";
          tile.appendChild(img);

          if (isOwned) {
            const badge = document.createElement("div");
            badge.className = "owned-badge";
            badge.innerHTML = "<span>OK</span>";
            tile.appendChild(badge);
          }

          const label = document.createElement("div");
          label.className = "card-label";
          label.innerHTML = `<div class="card-name">${shortName(card.name)}</div><div class="card-finish">${getFoilStatus(card)}</div><div class="card-set">Bundle: ${shortSet(card.bundle || card.set)} · ${card.num}</div>`;
          tile.appendChild(label);

          const dot = document.createElement("div");
          dot.className = "era-dot";
          tile.appendChild(dot);

          tile.addEventListener("click", () => {
            if (state.owned.has(card.id)) state.owned.delete(card.id);
            else state.owned.add(card.id);
            saveOwned();
            render();
          });

          return tile;
        });

        els.grid.replaceChildren(...nodes);
        els.empty.hidden = cards.length !== 0;
      }

      function shortName(name) {
        return name.length > 20 ? `${name.slice(0, 19)}...` : name;
      }

      function shortSet(set) {
        return set.length > 24 ? `${set.slice(0, 23)}...` : set;
      }

      function renderStats() {
        const total = CHECKLIST_CARDS.length;
        const ownedCount = state.owned.size;
        const pct = Math.round((ownedCount / total) * 100);
        els.count.textContent = `${ownedCount}/${total}`;
        els.progressFill.style.width = `${pct}%`;
      }

      function render() {
        renderStats();
        renderFilters();
        renderCards(CHECKLIST_CARDS.filter(matchesCard));
      }

      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !navigator.standalone) {
        els.installNote.hidden = false;
      }

      render();
    </script>
  </body>
</html>
