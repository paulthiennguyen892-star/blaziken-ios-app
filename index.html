      * { box-sizing: border-box; }

        position: relative;

        pointer-events: none;
      }
      .background-art::before,

        content: "";

        pointer-events: none;

        animation: auraSweep 11s ease-in-out infinite alternate;
      }
      .background-art::after {
        background:
          linear-gradient(115deg, transparent 8%, rgba(255, 251, 198, 0.22) 18%, transparent 30%),
          linear-gradient(64deg, transparent 48%, rgba(255, 76, 35, 0.18) 57%, transparent 70%),
          linear-gradient(148deg, transparent 28%, rgba(255, 61, 144, 0.13) 36%, transparent 48%);
        background-size: 140% 140%;
        filter: blur(2px);
        opacity: 0.62;
        animation: flameSweep 8s ease-in-out infinite alternate;
      }
      .art {
        --art-opacity: 0.78;
        --dim-opacity: 0.64;
        --duration: 7s;
        --pulse-duration: 5s;
        --delay: 0s;
        --r: 0deg;
        --sx: 1;
        --sat: 1.55;
        --bright: 1.08;
        --hue: 0deg;
        --glow-a: rgba(255, 239, 128, 0.88);
        --glow-b: rgba(255, 93, 28, 0.74);
        position: absolute;
        z-index: 1;
        display: block;
        width: min(36vw, 470px);
        filter: saturate(var(--sat)) hue-rotate(var(--hue)) contrast(1.1) brightness(var(--bright)) drop-shadow(0 0 18px var(--glow-a)) drop-shadow(0 0 46px var(--glow-b)) drop-shadow(0 24px 48px rgba(0, 0, 0, 0.82));
        opacity: var(--art-opacity);
        transform: translate3d(0, -5px, 0) rotate(var(--r)) scaleX(var(--sx));
        transform-origin: center;
        animation: artDrift var(--duration) ease-in-out var(--delay) infinite alternate, artPulse var(--pulse-duration) ease-in-out var(--delay) infinite alternate;
        user-select: none;
      }
      .art-sprite {
        image-rendering: pixelated;
        filter: saturate(var(--sat)) hue-rotate(var(--hue)) contrast(1.24) brightness(var(--bright)) drop-shadow(0 0 14px var(--glow-a)) drop-shadow(0 0 34px var(--glow-b)) drop-shadow(0 18px 36px rgba(0, 0, 0, 0.88));
      }
      .art-vector {
        filter: saturate(var(--sat)) hue-rotate(var(--hue)) contrast(1.08) brightness(var(--bright)) drop-shadow(0 0 22px var(--glow-a)) drop-shadow(0 0 42px var(--glow-b)) drop-shadow(0 20px 40px rgba(0, 0, 0, 0.84));
      }
      .art-main {
        --art-opacity: 0.96;
        --dim-opacity: 0.82;
        --duration: 8.5s;
        --delay: -1.2s;

        --glow-a: rgba(255, 251, 156, 0.95);
        --glow-b: rgba(255, 61, 34, 0.82);
        --sat: 1.72;
        top: 90px;
        right: max(-280px, calc((100vw - 1180px) / 2 - 420px));

      }
      .art-home {

        --r: -6deg;
        --glow-a: rgba(255, 247, 151, 0.86);

      }
      .art-dream {
        --art-opacity: 0.6;
        --dim-opacity: 0.44;
        --duration: 7.8s;
        --delay: -4s;
        --r: 9deg;
        --glow-a: rgba(255, 245, 139, 0.78);
        --glow-b: rgba(255, 40, 97, 0.62);

        --hue: -5deg;
        top: 38vh;
        left: max(-230px, calc((100vw - 1180px) / 2 - 350px));
        width: clamp(210px, 19vw, 280px);
        opacity: var(--art-opacity);
        transform: rotate(9deg);
      }
      .art-float-a {
        --art-opacity: 0.66;
        --dim-opacity: 0.5;
        --duration: 6.6s;
        --delay: -1.8s;
        --r: -13deg;
        --sx: -1;
        --glow-a: rgba(255, 236, 113, 0.9);
        --glow-b: rgba(255, 54, 39, 0.66);
        --sat: 1.95;
        top: 82px;
        left: max(-180px, calc((100vw - 1180px) / 2 - 290px));
        width: clamp(150px, 13vw, 200px);
        opacity: var(--art-opacity);
        transform: rotate(-13deg) scaleX(-1);
      }
      .art-float-b {
        --art-opacity: 0.62;
        --dim-opacity: 0.48;
        --duration: 7.2s;
        --delay: -2.8s;
        --r: 9deg;
        --glow-a: rgba(255, 240, 126, 0.88);
        --glow-b: rgba(255, 46, 116, 0.58);

        right: max(-240px, calc((100vw - 1180px) / 2 - 360px));
        width: clamp(155px, 14vw, 220px);
        opacity: var(--art-opacity);
        transform: rotate(9deg);
      }
      .art-float-c {
        display: none;
      }
      .art-float-d {
        display: none;
      }
      @keyframes backdropShift {
        from { transform: translate3d(-1.5%, -1%, 0) scale(1.02) rotate(-1deg); }
        to { transform: translate3d(1.5%, 1%, 0) scale(1.07) rotate(1deg); }
      }
      @keyframes auraSweep {

      }

        from { background-position: 0% 42%; transform: translate3d(-1%, 0, 0); }
        to { background-position: 100% 58%; transform: translate3d(1%, 0, 0); }
      }
      @keyframes artDrift {
        from { transform: translate3d(0, -7px, 0) rotate(var(--r)) scaleX(var(--sx)); }
        to { transform: translate3d(0, 8px, 0) rotate(calc(var(--r) + 2deg)) scaleX(var(--sx)); }
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;

        border-bottom: 1px solid rgba(255, 202, 91, 0.7);

        backdrop-filter: blur(14px);
        box-shadow: 0 3px 24px rgba(95, 22, 0, 0.5), 0 0 34px rgba(255, 182, 61, 0.34);
      }
      .header-inner {

        margin: 0 auto;
      }
      .title-row {

        gap: 9px;
        margin-bottom: 9px;
      }
      .logo {

        height: 36px;

        overflow: hidden;

        object-position: center 48%;

      }
      h1 {

      .search {

      .pill.active {

      .scan-button {

        margin: 0 auto;

      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
        gap: 12px;
      }
      .card {
        --halo-color: color-mix(in srgb, var(--era-color) 54%, #ffe08a);
        position: relative;
        aspect-ratio: 63 / 88;
        overflow: hidden;
        border: 2px solid color-mix(in srgb, var(--era-color) 35%, transparent);
        border-radius: 12px;
        background: linear-gradient(145deg, #251108, #070302);
        filter: drop-shadow(0 0 10px color-mix(in srgb, var(--halo-color) 58%, transparent)) drop-shadow(0 0 22px color-mix(in srgb, var(--halo-color) 32%, transparent));
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.88),
          0 0 0 5px color-mix(in srgb, var(--era-color) 24%, transparent),
          0 0 22px 5px color-mix(in srgb, var(--halo-color) 46%, transparent),
          0 0 44px 10px color-mix(in srgb, var(--halo-color) 28%, transparent),
          0 12px 26px rgba(0, 0, 0, 0.88),
          0 4px 22px color-mix(in srgb, var(--era-color) 24%, transparent);
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(135deg, rgba(255, 216, 154, 0.14), transparent 28%, transparent 66%, rgba(232, 93, 47, 0.14));
        pointer-events: none;

      .card:active { transform: scale(0.985); }

        .card:not(.owned):hover { transform: translateY(-3px) scale(1.035); }

      .card.owned {
        border-color: rgba(255, 255, 255, 0.18);

      .card img {
        display: block;
        width: 100%;
        height: 100%;

      .card.owned img {

      }
      .card-label {

      function loadOwned() {
        try {

        els.scanner.hidden = false;

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setScanStatus("Camera access needs a modern browser and usually an HTTPS hosted version of this app.");
          return;
        }

        try {
          stopScanner();
          scannerStream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          });
          els.scannerVideo.srcObject = scannerStream;
          await els.scannerVideo.play();
          setScanStatus("Camera ready. Fill the frame with the card, then tap Scan This Card.");
        } catch (error) {
          setScanStatus(`Camera unavailable: ${error.message}. On iPhone, use the hosted HTTPS app and allow camera permission.`);
        }

      }

      function stopScanner() {
        if (scannerStream) {
          scannerStream.getTracks().forEach((track) => track.stop());
          scannerStream = null;
        }
        els.scannerVideo.pause();
        els.scannerVideo.srcObject = null;
      }

      function loadTesseract() {
        if (window.Tesseract) return Promise.resolve(window.Tesseract);
        if (tesseractPromise) return tesseractPromise;

        tesseractPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = TESSERACT_SCRIPT_URL;
          script.async = true;
          script.onload = () => window.Tesseract ? resolve(window.Tesseract) : reject(new Error("OCR library did not load."));
          script.onerror = () => reject(new Error("Could not load OCR library. Check your internet connection."));
          document.head.appendChild(script);
        });

        return tesseractPromise;
      }

      function captureScanFrame() {
        const video = els.scannerVideo;
        const canvas = els.scanCanvas;
        const sourceWidth = video.videoWidth || 900;
        const sourceHeight = video.videoHeight || 1200;
        const width = Math.min(sourceWidth, 1100);
        const height = Math.round(width * (sourceHeight / sourceWidth));
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, width, height);
        ctx.filter = "contrast(1.35) saturate(0.28) brightness(1.08)";
        ctx.drawImage(video, 0, 0, width, height);
        ctx.filter = "none";
        return canvas;
      }

      async function scanCurrentFrame() {
        if (scanBusy) return;
        if (!els.scannerVideo.videoWidth) {
          setScanStatus("Camera is not ready yet.");
          return;
        }

        scanBusy = true;
        els.scanCapture.disabled = true;
        els.scanResult.hidden = true;
        setScanStatus("Capturing card image...");

        try {
          const canvas = captureScanFrame();
          setScanStatus("Loading OCR reader...");
          const Tesseract = await loadTesseract();
          setScanStatus("Reading text from the card...");

          const result = await Tesseract.recognize(canvas, "eng", {
            workerPath: "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js",
            corePath: "https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js",
            langPath: "https://tessdata.projectnaptha.com/4.0.0",
            logger: (message) => {
              if (!message.status) return;
              const progress = typeof message.progress === "number" ? ` ${Math.round(message.progress * 100)}%` : "";
              setScanStatus(`${message.status}${progress}`);
            },
          });

          const rawText = result.data && result.data.text ? result.data.text : "";
          const match = findScanMatch(rawText);
          renderScanResult(match, rawText);
        } catch (error) {
          els.scanResult.hidden = false;
          els.scanResult.innerHTML = `<strong>Scan failed.</strong><div>${escapeHtml(error.message)}</div>`;
          setScanStatus("Scan failed. Try again with brighter light and a straighter card angle.");
        } finally {
          scanBusy = false;
          els.scanCapture.disabled = false;
        }
      }

      function findScanMatch(rawText) {
        const text = normalizeScanText(rawText);
        const ranked = CHECKLIST_CARDS
          .map((card) => ({ card, score: scoreScanCandidate(card, text) }))
          .sort((a, b) => b.score - a.score);
        const best = ranked[0];

        if (!text || !best || best.score < 28) {
          return { card: null, score: best ? best.score : 0, alternatives: [], text };
        }

        const seen = new Set([best.card.cardId]);
        const alternatives = [];
        for (const item of ranked.slice(1)) {
          if (item.score < best.score - 14 || seen.has(item.card.cardId)) continue;
          alternatives.push(item);
          seen.add(item.card.cardId);
          if (alternatives.length === 3) break;
        }

        return { card: best.card, score: best.score, alternatives, text };
      }

      function scoreScanCandidate(card, text) {
        let score = 0;
        const compactText = text.replace(/\s+/g, "");
        const cardName = normalizeScanText(card.name.replace(/[()]/g, " "));
        const cardNum = normalizeScanText(card.num);
        const compactNum = cardNum.replace(/\s+/g, "");

        if (text.includes(cardName)) score += 30;
        if (text.includes("blaziken")) score += 18;

        ["vmax", "gx", " ex", " lv x", " fb", " mega"].forEach((form) => {
          const compactForm = form.trim().replace(/\s+/g, "");
          if (cardName.replace(/\s+/g, "").includes(compactForm) && compactText.includes(compactForm)) score += 10;
        });

        if (compactText.includes(compactNum)) {
          score += 70;
        } else {
          const parts = cardNum.match(/[a-z]*\d+/g) || [];
          const matchedParts = parts.filter((part) => compactText.includes(part));
          if (matchedParts.length === parts.length && parts.length > 1) score += 48;
          else score += matchedParts.length * 14;
        }

        score += scanTokenScore(card.set, text, 5, 30);
        score += scanTokenScore(card.bundle || "", text, 2, 14);
        score += scanTokenScore(card.rarity, text, 2, 10);
        score += scanTokenScore(getFoilStatus(card), text, 2, 8);
        return score;
      }

      function scanTokenScore(value, text, points, maxScore) {
        const stop = new Set(["the", "and", "for", "from", "with", "card", "cards", "pokemon", "holo", "rare", "set", "pack"]);
        const tokens = Array.from(new Set(normalizeScanText(value).split(" ")))
          .filter((token) => token.length >= 3 && !stop.has(token));
        const score = tokens.reduce((total, token) => total + (text.includes(token) ? points : 0), 0);
        return Math.min(score, maxScore);
      }

      function normalizeScanText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[|]/g, "/")
          .replace(/[’‘]/g, "'")
          .replace(/lv\.\s*x/g, "lv x")
          .replace(/[^a-z0-9/.\s-]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function renderScanResult(match, rawText) {
        els.scanResult.hidden = false;
        const detectedText = rawText.trim() || "No readable text detected.";

        if (!match.card) {
          setScanStatus("No confident match found.");
          els.scanResult.innerHTML = `
            <strong>No confident match yet.</strong>
            <div>Try again closer, with less glare, and make sure the card name and collector number are visible.</div>
            <details><summary>Detected text</summary><pre class="scan-raw">${escapeHtml(detectedText)}</pre></details>
          `;
          return;
        }

        const card = match.card;
        const exactOwned = state.owned.has(card.id);
        const related = CHECKLIST_CARDS.filter((item) => item.cardId === card.cardId);
        const ownedRelated = related.filter((item) => state.owned.has(item.id));
        const hasAnyPrint = exactOwned || ownedRelated.length > 0;
        const ownedClass = hasAnyPrint ? "scan-owned" : "scan-missing";
        const ownedMessage = exactOwned
          ? "You already have this exact checklist entry."
          : ownedRelated.length
            ? `You have this card number marked in ${ownedRelated.length}/${related.length} print variant(s), but not this matched print.`
            : "You do not have this card marked owned yet.";
        const alternatives = match.alternatives.length
          ? `<div>Other close match: ${match.alternatives.map((item) => `${escapeHtml(item.card.name)} ${escapeHtml(item.card.num)}`).join(", ")}</div>`
          : "";

        els.scanResult.innerHTML = `
          <div class="scanner-card-result">
            <img src="${escapeHtml(card.img)}" alt="${escapeHtml(card.name)}">
            <div>
              <div class="scan-result-title">${escapeHtml(card.name)} · ${escapeHtml(card.num)}</div>
              <div>${escapeHtml(card.set)}</div>
              <div>${escapeHtml(getFoilStatus(card))} · ${escapeHtml(card.bundle || card.set)}</div>
              <div class="${ownedClass}">${escapeHtml(ownedMessage)}</div>
            </div>
          </div>
          ${exactOwned ? "" : `<button class="scan-owned-action" type="button" data-scan-own="${escapeHtml(card.id)}">Mark Matched Print Owned</button>`}
          ${alternatives}
          <details><summary>Detected text</summary><pre class="scan-raw">${escapeHtml(detectedText)}</pre></details>
        `;

        const markButton = els.scanResult.querySelector("[data-scan-own]");
        if (markButton) {
          markButton.addEventListener("click", () => {
            state.owned.add(card.id);
            saveOwned();
            render();
            renderScanResult(match, rawText);
          });
        }

        setScanStatus(`Best match: ${card.name} ${card.num}.`);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function matchesCard(card) {
        const search = state.search.trim().toLowerCase();
        if (state.era !== "All" && card.era !== state.era) return false;
        if (state.ownedFilter === "owned" && !state.owned.has(card.id)) return false;
        if (state.ownedFilter === "missing" && state.owned.has(card.id)) return false;
        if (!search) return true;
        return card.name.toLowerCase().includes(search) ||
          card.set.toLowerCase().includes(search) ||
          (card.bundle || "").toLowerCase().includes(search) ||
          card.num.toLowerCase().includes(search) ||
          card.rarity.toLowerCase().includes(search) ||
          getFoilStatus(card).toLowerCase().includes(search);
      }

      function getFoilStatus(card) {
        if (card.finish) return card.finish;
        if (card.rarity.includes("Rainbow")) return "Rainbow Holo";
        if (card.rarity.includes("Alt Art")) return "Alt Art Holo";
        if (card.rarity.includes("Full Art") || card.rarity.includes("Trainer")) return "Full Art Holo";
        if (card.rarity.includes("Illus")) return "Illustration Holo";
        if (card.rarity === "Promo") return "Promo Holo";
        if (card.rarity.includes("Holo") || card.rarity.includes("Ultra") || card.rarity.includes("Double")) return "Holo";
        if (card.era === "SV Era" && card.rarity === "Rare") return "Holo";
        return "Non-Holo";
      }

      function makePill(label, active, color, onClick) {
        const button = document.createElement("button");
        button.className = active ? "pill active" : "pill";
        button.textContent = label;
        if (color) button.style.setProperty("--active-color", color);
        button.type = "button";
        button.addEventListener("click", onClick);
        return button;
      }

      function renderFilters() {
        els.ownedFilters.replaceChildren(
          makePill("All", state.ownedFilter === "all", "#e85d2f", () => { state.ownedFilter = "all"; render(); }),
          makePill("Owned", state.ownedFilter === "owned", "#e85d2f", () => { state.ownedFilter = "owned"; render(); }),
          makePill("Need", state.ownedFilter === "missing", "#e85d2f", () => { state.ownedFilter = "missing"; render(); })
        );

        const eraButtons = ERAS.map((era) => {
          const color = ERA_COLORS[era] || "#e85d2f";
          return makePill(era, state.era === era, color, () => { state.era = era; render(); });
        });
        els.eraFilters.replaceChildren(...eraButtons);
      }

      function renderCards(cards) {
        const nodes = cards.map((card) => {
          const isOwned = state.owned.has(card.id);
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = isOwned ? "card owned" : "card";
          tile.style.setProperty("--era-color", ERA_COLORS[card.era] || "#e85d2f");
          tile.setAttribute("aria-label", `${isOwned ? "Mark missing" : "Mark owned"}: ${card.name} ${card.num}, ${card.bundle || card.set}, ${getFoilStatus(card)}`);

          const img = document.createElement("img");
          img.src = card.img;
          img.alt = `${card.name} ${card.set} ${card.num}`;
          img.loading = "lazy";
          img.decoding = "async";
          tile.appendChild(img);

          if (isOwned) {
            const badge = document.createElement("div");
            badge.className = "owned-badge";
            badge.innerHTML = "<span>OK</span>";
            tile.appendChild(badge);
          }

          const label = document.createElement("div");
          label.className = "card-label";
          label.innerHTML = `<div class="card-name">${shortName(card.name)}</div><div class="card-finish">${getFoilStatus(card)}</div><div class="card-set">Bundle: ${shortSet(card.bundle || card.set)} · ${card.num}</div>`;
          tile.appendChild(label);

          const dot = document.createElement("div");
          dot.className = "era-dot";
          tile.appendChild(dot);

          tile.addEventListener("click", () => {
            if (state.owned.has(card.id)) state.owned.delete(card.id);
            else state.owned.add(card.id);
            saveOwned();
            render();
          });

          return tile;
        });

        els.grid.replaceChildren(...nodes);
        els.empty.hidden = cards.length !== 0;
      }

      function shortName(name) {
        return name.length > 20 ? `${name.slice(0, 19)}...` : name;
      }

      function shortSet(set) {
        return set.length > 24 ? `${set.slice(0, 23)}...` : set;
      }

      function renderStats() {
        const total = CHECKLIST_CARDS.length;
        const ownedCount = state.owned.size;
        const pct = Math.round((ownedCount / total) * 100);
        els.count.textContent = `${ownedCount}/${total}`;
        els.progressFill.style.width = `${pct}%`;
      }

      function render() {
        renderStats();
        renderFilters();
        renderCards(CHECKLIST_CARDS.filter(matchesCard));
      }

      els.scanOpen.addEventListener("click", openScanner);
      els.scanClose.addEventListener("click", closeScanner);
      els.scanCapture.addEventListener("click", scanCurrentFrame);
      els.scanner.addEventListener("click", (event) => {
        if (event.target === els.scanner) closeScanner();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !els.scanner.hidden) closeScanner();
      });

      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !navigator.standalone) {
        els.installNote.hidden = false;
      }

      render();
    </script>
  </body>
</html>
